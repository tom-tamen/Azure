# ============================================
# CI/CD Azure Static Web Apps + API (Node/Jest)
# - Pipeline unique : tests API -> build/deploy
# - Auth via deployment token (secret GitHub)
# - Préviews automatiques pour les Pull Requests
# - Fermeture auto des environnements PR à la clôture
# - Concurrency pour éviter les déploiements parallèles
# Structure visée :
#   /api           -> Azure Functions (+ tests Jest dans /api/__tests__)
#   /              -> frontend statique (index.html au root)
# ============================================

name: CI/CD Azure Static Web Apps

on:
  # Déclenchement sur push et pull_request (branche main)
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

# Empêche les déploiements concurrents sur la même ref (branche/PR)
concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------
  # 1) Tests de l'API (Jest)
  # ------------------------------
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      # Récupération du code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installation de Node.js + activation du cache npm
      # Les chemins de lockfiles servent de clé pour le cache :
      #  - api/package-lock.json (API)
      #  - package-lock.json (frontend statique au root)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            api/package-lock.json
            package-lock.json

      # Installation des dépendances API (npm ci pour des builds déterministes)
      - name: Install API dependencies
        working-directory: api
        run: npm ci

      # Exécution des tests unitaires (Jest ; config détectée : api/jest.config.js)
      - name: Run API unit tests
        working-directory: api
        run: npm test

  # ------------------------------
  # 2) Build & Deploy Azure SWA
  #    (exécuté uniquement si les tests réussissent)
  # ------------------------------
  build_and_deploy:
    name: Build & Deploy (Azure SWA)
    needs: api-tests  # Dépendance explicite : ce job attend la réussite des tests
    # Sur push : déploiement.
    # Sur PR : environnement de preview (sauf quand la PR est fermée).
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest

    # Permissions minimales :
    # - contents:read pour lire le repo
    # (OIDC non requis ici car déploiement par token)
    permissions:
      contents: read

    # Environnement GitHub :
    # - "production" pour les pushes
    # - "preview" pour les PR (pratique pour des règles/approvals différentes)
    environment: ${{ github.event_name == 'push' && 'production' || 'preview' }}

    steps:
      # Récupération du code source
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true  # Inclure d'éventuels submodules
          lfs: false        # Git LFS non requis dans ce contexte

      # Installation de Node.js + cache npm partagé (API + root)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            api/package-lock.json
            package-lock.json


      # Déploiement vers Azure Static Web Apps
      # Auth par token (secret GitHub) requis par l'action de déploiement
      - name: Build And Deploy to Azure Static Web Apps
        id: swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: upload                   # Type d'action : upload (déploiement)
          # Emplacement du frontend :
          app_location: "./frontend"
          # Emplacement de l'API (Azure Functions)
          api_location: "./api"
      
          # Secret requis : token de déploiement SWA
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

  # ------------------------------
  # 3) Fermeture de l'environnement de preview (PR)
  # ------------------------------
  close_pr_preview:
    name: Close PR preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close PR environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: close
