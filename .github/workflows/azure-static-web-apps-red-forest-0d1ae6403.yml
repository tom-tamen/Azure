# ============================================
# CI/CD Azure Static Web Apps + API (Node/Jest)
# - Tests API (Jest) -> Build & Deploy SWA
# - Déploiement sur push main
# - Préviews automatiques sur Pull Requests
# - Fermeture auto des environnements PR à la clôture
# - Concurrency : évite les runs parallèles sur la même ref
# - Check du token SWA (présence + pas de newline)
# ============================================

name: CI/CD Azure Static Web Apps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, closed ]
  workflow_dispatch:

concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------
  # 1) Tests de l'API (Jest)
  # ------------------------------
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            api/package-lock.json
            package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Run API unit tests
        working-directory: api
        run: npm test

  # ------------------------------
  # 2) Build & Deploy Azure SWA
  #    (seulement si les tests passent)
  # ------------------------------
  build_and_deploy:
    name: Build & Deploy (Azure SWA)
    needs: api-tests
    # Sur push -> déploiement prod
    # Sur PR   -> preview (sauf quand PR "closed")
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            api/package-lock.json
            package-lock.json

      # Vérifie que le secret est bien injecté et sans espaces/newlines
      - name: Check SWA token presence and cleanliness
        run: |
          if [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" ]; then
            echo "ERROR: AZURE_STATIC_WEB_APPS_API_TOKEN secret is missing."; exit 1
          fi
          RAW_LEN=$(echo -n "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" | wc -c)
          CLEAN_LEN=$(echo -n "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" | tr -d ' \n\r' | wc -c)
          echo "Token length: $RAW_LEN | Clean length: $CLEAN_LEN"
          if [ "$RAW_LEN" -ne "$CLEAN_LEN" ]; then
            echo "ERROR: Token contains whitespace/newlines. Recollez-le sur une seule ligne dans GitHub Secrets."; exit 1
          fi
          echo -n "Token fingerprint: "; echo -n "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" | sha256sum | cut -c1-16

      - name: Build And Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: upload
          app_location: ./frontend
          api_location: ./api
          data_api_location: ""     # évite la vérif 'swa-db-connections'
          production_branch: main   # explicite
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

  # ------------------------------
  # 3) Fermeture de l'environnement de preview (PR)
  # ------------------------------
  close_pr_preview:
    name: Close PR preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close PR environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: close
